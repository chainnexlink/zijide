server {
    listen 80;
    server_name warrescue.com www.warrescue.com;

    # HTTP -> HTTPS redirect (certbot will handle this after SSL setup)
    # After running certbot, this block will auto-redirect to HTTPS
    root /var/www/warrescue;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
}
