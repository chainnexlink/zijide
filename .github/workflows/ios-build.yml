name: Build iOS & Upload to App Store Connect

on:
  workflow_dispatch:
    inputs:
      upload_to_appstore:
        description: 'Upload to App Store Connect'
        required: true
        default: 'true'
        type: boolean

jobs:
  # 冒烟测试：用 iOS 26 模拟器真实启动 App，截图，若黑屏/空白则构建失败。
  # 这样在上传给苹果之前就能确认不再黑屏（绝不盲提交）。上传 job 依赖它通过。
  ios-smoke:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK)
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then echo "::error::No Xcode 26 on runner"; ls -d /Applications/Xcode*.app; exit 1; fi
          echo "Selecting: $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync web assets + native plugins to iOS
        run: npx cap sync ios

      - name: Build app for iOS Simulator (unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App \
            -configuration Debug -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./dd \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build

      - name: Boot an iOS 26 iPad simulator
        run: |
          RT=$(xcrun simctl list runtimes | grep -Eo 'com.apple.CoreSimulator.SimRuntime.iOS-26[^ ]*' | head -1)
          echo "Runtime: $RT"
          UDID=$(xcrun simctl create ci-ipad 'iPad Air 11-inch (M3)' "$RT" 2>/dev/null \
                 || xcrun simctl create ci-ipad 'iPad Pro 11-inch (M4)' "$RT" 2>/dev/null \
                 || xcrun simctl create ci-iphone 'iPhone 16 Pro' "$RT")
          echo "UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Install + launch app (capture logs)
        run: |
          APP=$(find ./dd/Build/Products -maxdepth 3 -name '*.app' | head -1)
          echo "APP=$APP"
          xcrun simctl install "$UDID" "$APP"
          BID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Info.plist")
          echo "Bundle id: $BID"
          xcrun simctl launch --terminate-running-process --stdout=app_out.log --stderr=app_err.log "$UDID" "$BID" || true
          sleep 18

      - name: Screenshot launch
        run: xcrun simctl io "$UDID" screenshot launch.png

      - name: Fail if launch screen is black/blank
        run: |
          python3 -m pip install --quiet --disable-pip-version-check Pillow || pip3 install --quiet Pillow || true
          python3 -c "from PIL import Image, ImageStat; s=ImageStat.Stat(Image.open('launch.png').convert('L')); m=s.mean[0]/255; d=s.stddev[0]/255; print('brightness mean=%.4f std=%.4f'%(m,d)); import sys; sys.exit(0 if (m>0.05 and d>0.01) else 1)" || { echo '::error::BLACK/BLANK launch screen detected (App Store 2.1 repro)'; exit 1; }
          echo "Launch screen is NOT black -- smoke test passed."

      - name: Show app logs
        if: always()
        run: |
          echo '=== app stdout (tail) ==='; tail -60 app_out.log 2>/dev/null || true
          echo '=== app stderr (tail) ==='; tail -60 app_err.log 2>/dev/null || true

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-smoke
          path: |
            launch.png
            app_out.log
            app_err.log
          if-no-files-found: ignore

  build-ios:
    needs: ios-smoke
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK required by Apple + Capacitor 8)
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then echo "::error::No Xcode 26 found on runner"; ls -d /Applications/Xcode*.app; exit 1; fi
          echo "Selecting: $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version
          SDKV=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "iOS SDK: $SDKV"
          case "$SDKV" in 26.*) echo "OK iOS 26 SDK";; *) echo "::error::Expected iOS 26 SDK, got $SDKV"; exit 1;; esac

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync web assets + native plugins to iOS
        run: npx cap sync ios

      - name: Generate App Icons
        run: |
          SOURCE="ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png"
          DEST="ios/App/App/Assets.xcassets/AppIcon.appiconset"

          # Generate all required icon sizes from 1024x1024 source
          sips -z 20 20 "$SOURCE" --out "$DEST/Icon-20.png"
          sips -z 29 29 "$SOURCE" --out "$DEST/Icon-29.png"
          sips -z 40 40 "$SOURCE" --out "$DEST/Icon-40.png"
          sips -z 40 40 "$SOURCE" --out "$DEST/Icon-20@2x.png"
          sips -z 58 58 "$SOURCE" --out "$DEST/Icon-29@2x.png"
          sips -z 60 60 "$SOURCE" --out "$DEST/Icon-20@3x.png"
          sips -z 80 80 "$SOURCE" --out "$DEST/Icon-40@2x.png"
          sips -z 87 87 "$SOURCE" --out "$DEST/Icon-29@3x.png"
          sips -z 120 120 "$SOURCE" --out "$DEST/Icon-40@3x.png"
          sips -z 120 120 "$SOURCE" --out "$DEST/Icon-60@2x.png"
          sips -z 152 152 "$SOURCE" --out "$DEST/Icon-76@2x.png"
          sips -z 167 167 "$SOURCE" --out "$DEST/Icon-83.5@2x.png"
          sips -z 180 180 "$SOURCE" --out "$DEST/Icon-60@3x.png"
          cp "$SOURCE" "$DEST/Icon-1024.png"

          echo "Generated icons:"
          ls -la "$DEST"/Icon-*.png

      - name: Fix iOS deployment target
        working-directory: ios/App
        run: |
          sed -i '' "s/platform :ios, '.*'/platform :ios, '16.0'/" Podfile
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' App.xcodeproj/project.pbxproj

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        # 显式加上 multi_json:fastlane 间接依赖 representable -> multi_json，
        # 但 macOS runner 镜像近期更新把预装的 multi_json 移除了，导致 `fastlane release`
        # 启动时 Gem::MissingSpecError 立即崩溃（见 Run #54 日志）。固定写死避免漂移。
        run: gem install fastlane multi_json

      - name: Setup API Key file
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" > ~/.private_keys/AuthKey.p8
          echo "API_KEY_PATH=$HOME/.private_keys/AuthKey.p8" >> $GITHUB_ENV

      - name: Setup Keychain for Code Signing
        run: |
          KEYCHAIN_PASSWORD="ci_build_temp_pwd_$(date +%s)"
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"

          # Create keychain with non-empty password (critical for set-key-partition-list)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Set as default and add to search list
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # Import Apple WWDR intermediate certificates for trust chain
          curl -sO https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -sO https://www.apple.com/certificateauthority/AppleWWDRCAG6.cer
          security import AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security import AppleWWDRCAG6.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          rm -f AppleWWDRCAG3.cer AppleWWDRCAG6.cer

          # Allow codesign to access keychain items without UI prompt
          # Note: may fail with "item not found" if no private keys exist yet - that's OK
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true

          # Export for Fastlane
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Build and Upload with Fastlane
        working-directory: ios/App
        run: |
          if [ "${{ inputs.upload_to_appstore }}" = "true" ]; then
            fastlane release
          else
            fastlane build_only
          fi

      - name: Upload IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WarRescue-iOS
          path: ios/App/*.ipa
          retention-days: 30
          if-no-files-found: ignore
