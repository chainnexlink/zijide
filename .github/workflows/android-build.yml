name: Build Android (APK)

# 在 GitHub「Actions」手动点 Run，云端构建安卓 APK（可直接装到手机测试）。
# GitHub 跑得到 JDK 21，所以 Capacitor 8 插件原生编译，无需本地那套降级处理。
# 注：Google Play 上架需「签名的 AAB」，要你提供 keystore；这里先产出可安装的 debug APK。

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync to Android (web + native plugins)
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarRescue-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
