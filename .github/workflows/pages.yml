name: Deploy Pages (隐私政策/支持页)

# 把 docs/ 里的静态页面（隐私政策、支持页）发布到 GitHub Pages。
# 合并到 main 后自动运行；也可在 Actions 里手动 Run。
# 站点地址形如：https://chainnexlink.github.io/zijide/privacy.html

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (自动开启 Pages)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
