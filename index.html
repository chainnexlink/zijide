<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, user-scalable=no, viewport-fit=cover">
  <title>智能预警平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 内联样式确保主题色立即生效，避免闪烁 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    html.light, html.light body {
      background-color: #ffffff !important;
      color: #000000;
    }
    html.dark, html.dark body {
      background-color: #1a1a1a !important;
      color: #ffffff;
    }
  </style>
  <script>
    // 在 React 加载前立即设置主题，避免闪烁
    (function() {
      const isInIframe = window.self !== window.top;

      function applyThemeToDOM(theme) {
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
        document.documentElement.setAttribute('data-theme', theme);
      }

      if (isInIframe) {
        // 监听父窗口主动推送的主题消息
        window.addEventListener('message', function(event) {
          if (event.data && typeof event.data.theme === 'string') {
            const theme = event.data.theme;
            if (theme === 'light' || theme === 'dark') {
              applyThemeToDOM(theme);
            }
          }
        });
      } else {
        // 非 iframe 环境，使用默认 light 主题
        applyThemeToDOM('light');
      }
    })();
  </script>
  <script>
    // 全局错误兜底：bundle 在启动阶段抛出任何未捕获错误时，
    // 若 #root 仍为空（React 没渲染出来），注入一个可读的「出错/重试」页面，
    // 确保任何异常下都不会出现“纯白屏”（App Store Guideline 2.1 被拒主因）。
    (function () {
      var shown = false;
      function showFallback() {
        if (shown) return;
        var root = document.getElementById('root');
        if (!root || (root.childElementCount && root.childElementCount > 0)) return; // 已渲染出内容
        shown = true;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">' +
          '<div style="font-size:48px;margin-bottom:16px">⚠️</div>' +
          '<div style="font-size:20px;font-weight:700;margin-bottom:8px">出了点问题 / Something went wrong</div>' +
          '<div style="font-size:14px;opacity:.8;max-width:320px;margin-bottom:24px;line-height:1.5">应用启动时遇到一个错误，请点击下方重试。<br/>The app hit an error on launch. Please retry.</div>' +
          '<button onclick="window.location.reload()" style="background:#f97316;color:#fff;border:none;border-radius:9999px;padding:12px 32px;font-size:16px;font-weight:600;cursor:pointer">重试 / Retry</button>' +
          '</div>';
      }
      function scheduleCheck() { setTimeout(showFallback, 1500); }
      window.addEventListener('error', scheduleCheck);
      window.addEventListener('unhandledrejection', scheduleCheck);
      // 最后兜底：12 秒后若仍空白则显示重试页
      setTimeout(showFallback, 12000);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
